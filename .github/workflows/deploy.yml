name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # ---------- ポータル ----------
      - name: 制作期間を算出してポータルに埋め込み
        run: |
          calc_period() {
            local dir="$1" placeholder="$2" is_submodule="${3:-false}"
            if [ "$is_submodule" = "true" ]; then
              first=$(git -C "$dir" log --format="%at %ai" --reverse | head -1)
              last=$(git -C "$dir" log --format="%at %ai" | head -1)
            else
              first=$(git log --format="%at %ai" --reverse -- "$dir" | head -1)
              last=$(git log --format="%at %ai" -- "$dir" | head -1)
            fi
            ts_first=$(echo "$first" | awk '{print $1}')
            ts_last=$(echo "$last" | awk '{print $1}')
            date_first=$(echo "$first" | awk '{print $2}')
            date_last=$(echo "$last" | awk '{print $2}')
            y1=$(echo "$date_first" | cut -d- -f1)
            m1=$(echo "$date_first" | cut -d- -f2 | sed 's/^0//')
            d1=$(echo "$date_first" | cut -d- -f3 | sed 's/^0//')
            m2=$(echo "$date_last" | cut -d- -f2 | sed 's/^0//')
            d2=$(echo "$date_last" | cut -d- -f3 | sed 's/^0//')
            diff=$(( (ts_last - ts_first) ))
            days=$(( diff / 86400 ))
            hours=$(( (diff % 86400) / 3600 ))
            period="${y1}/${m1}/${d1} → ${m2}/${d2}（${days}日${hours}時間）"
            sed -i "s|{{${placeholder}}}|${period}|g" portal/index.html
          }
          calc_period "Retro Games"   "PERIOD_RETRO_GAMES"
          calc_period "travel-shiori" "PERIOD_TRAVEL_SHIORI"
          calc_period "nittei-chousei" "PERIOD_NITTEI_CHOUSEI" true
          calc_period "houmon-app"    "PERIOD_HOUMON_APP"

      - name: ポータルページをコピー
        run: |
          mkdir -p _site
          cp portal/index.html _site/index.html

      # ---------- Retro Games ----------
      - name: レトロゲームをコピー
        run: |
          mkdir -p "_site/retro-games"
          cp "Retro Games/index.html" "_site/retro-games/index.html"
          cp "Retro Games/plusman.html" "_site/retro-games/plusman.html"
          cp "Retro Games/samurai_fighter.html" "_site/retro-games/samurai_fighter.html"
          cp "Retro Games/space_invaders.html" "_site/retro-games/space_invaders.html"

      # ---------- houmon-app ----------
      - name: houmon-app の依存をインストール
        working-directory: houmon-app
        run: npm ci

      - name: houmon-app をビルド
        working-directory: houmon-app
        run: npm run build
        env:
          BASE_PATH: /houmon-app

      - name: houmon-app をコピー
        run: cp -r houmon-app/out _site/houmon-app

      # ---------- travel-shiori ----------
      - name: travel-shiori の依存をインストール
        working-directory: travel-shiori
        run: npm ci

      - name: travel-shiori をビルド
        working-directory: travel-shiori
        run: npm run build
        continue-on-error: true

      - name: travel-shiori をコピー
        run: |
          if [ -d travel-shiori/out ]; then
            cp -r travel-shiori/out _site/travel-shiori
          else
            mkdir -p _site/travel-shiori
            echo '<html><body><p>Coming soon</p></body></html>' > _site/travel-shiori/index.html
          fi

      # ---------- nittei-chousei ----------
      - name: nittei-chousei の依存をインストール
        working-directory: nittei-chousei
        run: npm ci

      - name: nittei-chousei をビルド
        working-directory: nittei-chousei
        run: npm run build
        continue-on-error: true

      - name: nittei-chousei をコピー
        run: |
          if [ -d nittei-chousei/out ]; then
            cp -r nittei-chousei/out _site/nittei-chousei
          else
            mkdir -p _site/nittei-chousei
            echo '<html><body><p>Coming soon</p></body></html>' > _site/nittei-chousei/index.html
          fi

      # ---------- デプロイ ----------
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
