name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # ---------- ポータル ----------
      - name: ポータルHTML自動生成
        run: bash portal/build.sh

      - name: ポータルのファビコンをコピー
        run: cp portal/favicon.png _site/favicon.png

      # ---------- Retro Games ----------
      - name: レトロゲームをコピー
        run: |
          mkdir -p "_site/retro-games"
          cp "Retro Games/index.html" "_site/retro-games/index.html"
          cp "Retro Games/plusman.html" "_site/retro-games/plusman.html"
          cp "Retro Games/samurai_fighter.html" "_site/retro-games/samurai_fighter.html"
          cp "Retro Games/space_invaders.html" "_site/retro-games/space_invaders.html"
          cp "Retro Games/manifest.json" "_site/retro-games/manifest.json"
          cp "Retro Games/icon-192.png" "_site/retro-games/icon-192.png"
          cp "Retro Games/icon-512.png" "_site/retro-games/icon-512.png"
          cp "Retro Games/apple-touch-icon.png" "_site/retro-games/apple-touch-icon.png"
          cp "Retro Games/favicon-32.png" "_site/retro-games/favicon-32.png"

      # ---------- 空き時間みつける君 ----------
      - name: 空き時間みつける君をコピー
        run: |
          mkdir -p "_site/akijikan-mitsukeru-kun"
          cp akijikan-mitsukeru-kun/index.html "_site/akijikan-mitsukeru-kun/index.html"
          cp akijikan-mitsukeru-kun/manifest.json "_site/akijikan-mitsukeru-kun/manifest.json"
          cp akijikan-mitsukeru-kun/icon-192.png "_site/akijikan-mitsukeru-kun/icon-192.png"
          cp akijikan-mitsukeru-kun/icon-512.png "_site/akijikan-mitsukeru-kun/icon-512.png"
          cp akijikan-mitsukeru-kun/apple-touch-icon.png "_site/akijikan-mitsukeru-kun/apple-touch-icon.png"
          cp akijikan-mitsukeru-kun/favicon-32.png "_site/akijikan-mitsukeru-kun/favicon-32.png"

      # ---------- houmon-app ----------
      # houmon-app は Vercel に統一済み（https://houmon-app-lilac.vercel.app/）。
      # このリダイレクト HTML は「旧 GH Pages 版をブックマークしてる人」救済用。
      # ポータルサイトのカードは直接 Vercel URL に飛ぶので、通常はここを踏まない。
      - name: houmon-app は Vercel にリダイレクト
        run: |
          mkdir -p _site/houmon-app
          cat > _site/houmon-app/index.html <<'EOF'
          <!doctype html>
          <html lang="ja">
            <head>
              <meta charset="utf-8">
              <title>家庭訪問アプリ — 移動しました</title>
              <meta http-equiv="refresh" content="0; url=https://houmon-app-lilac.vercel.app/">
              <link rel="canonical" href="https://houmon-app-lilac.vercel.app/">
              <style>
                body { font-family: system-ui, -apple-system, sans-serif; padding: 2rem; text-align: center; color: #333; }
                a { color: #0070f3; text-decoration: none; font-weight: bold; }
              </style>
            </head>
            <body>
              <p>家庭訪問アプリは <a href="https://houmon-app-lilac.vercel.app/">houmon-app-lilac.vercel.app</a> に移動しました。</p>
              <p>自動的に遷移しない場合は上のリンクをタップしてください。</p>
            </body>
          </html>
          EOF

      # ---------- design-gallery ----------
      - name: design-gallery の依存をインストール
        working-directory: design-gallery
        run: npm ci
        continue-on-error: true

      # npm のフラッキーバグ対策: Linux 用ネイティブ SWC を明示インストール
      # （これがないと Turbopack が WASM フォールバックして build エラーになる）
      - name: design-gallery の Linux 用 SWC を明示インストール
        working-directory: design-gallery
        run: npm install --no-save @next/swc-linux-x64-gnu@16.2.3
        continue-on-error: true

      - name: design-gallery をビルド
        working-directory: design-gallery
        run: npm run build
        continue-on-error: true
        env:
          BASE_PATH: /design-gallery

      - name: design-gallery をコピー
        run: |
          if [ -d design-gallery/out ]; then
            cp -r design-gallery/out _site/design-gallery
          else
            mkdir -p _site/design-gallery
            echo '<html><body><p>Coming soon</p></body></html>' > _site/design-gallery/index.html
          fi

      # ---------- travel-shiori / nittei-chousei ----------
      # 本番は Vercel (travel-shiori.vercel.app / nittei-chousei.vercel.app)。
      # GitHub Pages 側ではビルドせず、ポータルから外部リンクで飛ばす運用に変更。
      # （product.meta.json の "path" に Vercel URL を設定済み）

      # ---------- デプロイ ----------
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
