name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # ---------- ポータル ----------
      - name: ポータルHTML自動生成
        run: bash portal/build.sh

      - name: ポータルのファビコンをコピー
        run: cp portal/favicon.png _site/favicon.png

      # ---------- Retro Games / 空き時間みつける君 ----------
      # 全プロジェクトを Vercel に統一済み。旧 GH Pages URL は redirect でVercel へ誘導する。
      # （ブックマーク救済用。ポータルカードは直接 Vercel URL に飛ぶ）
      - name: Retro Games は Vercel にリダイレクト
        run: |
          mkdir -p "_site/retro-games"
          cat > "_site/retro-games/index.html" <<'EOF'
          <!doctype html>
          <html lang="ja">
            <head>
              <meta charset="utf-8">
              <title>Retro Games — 移動しました</title>
              <meta http-equiv="refresh" content="0; url=https://retro-games-one.vercel.app/">
              <link rel="canonical" href="https://retro-games-one.vercel.app/">
              <style>body{font-family:system-ui,-apple-system,sans-serif;padding:2rem;text-align:center;color:#333;}a{color:#0070f3;text-decoration:none;font-weight:bold;}</style>
            </head>
            <body>
              <p>Retro Games は <a href="https://retro-games-one.vercel.app/">retro-games-one.vercel.app</a> に移動しました。</p>
            </body>
          </html>
          EOF

      # 空き時間みつける君は localStorage にカレンダー設定を保持するため、
      # 旧ドメインで設定してた人のデータを新ドメインに引き継ぐブリッジページを配置。
      # JS で localStorage を読み → base64 化 → 新URL の #migrate= に乗せて飛ばす。
      - name: 空き時間みつける君 は Vercel へ移行ブリッジ
        run: |
          mkdir -p "_site/akijikan-mitsukeru-kun"
          cat > "_site/akijikan-mitsukeru-kun/index.html" <<'EOF'
          <!doctype html>
          <html lang="ja">
            <head>
              <meta charset="utf-8">
              <title>空き時間みつける君 — 新URLへ移行</title>
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <link rel="canonical" href="https://akijikan-mitsukeru-kun.vercel.app/">
              <style>
                body { font-family: system-ui, -apple-system, sans-serif; padding: 2rem; max-width: 480px; margin: 0 auto; color: #222; line-height: 1.7; }
                h1 { font-size: 18px; margin-bottom: 12px; }
                p { font-size: 14px; color: #555; }
                .btn { display: inline-block; background: #0070f3; color: #fff; padding: 12px 20px; border-radius: 8px; font-weight: bold; text-decoration: none; margin-top: 16px; border: none; font-size: 15px; cursor: pointer; }
                .btn:active { opacity: 0.8; }
                .muted { font-size: 12px; color: #888; margin-top: 24px; }
                .muted a { color: #0070f3; }
              </style>
            </head>
            <body>
              <h1>空き時間みつける君は新URLに移行しました</h1>
              <p id="msg">このブラウザに保存されてた設定（カレンダーURL、Google Client ID など）を新URLに引き継ぎます。</p>
              <button class="btn" id="migrateBtn">新URLに移行する</button>
              <p class="muted">移行不要の場合は <a href="https://akijikan-mitsukeru-kun.vercel.app/">こちら</a> から直接アクセス。</p>
              <script>
                (function(){
                  var KEYS = ['akijikan_ics_cals_v1','akijikan_ics_seeded_v1','gcal_token','gcal_client_id','gcal_bookmark_hint_shown'];
                  var data = {};
                  var count = 0;
                  for (var i=0; i<KEYS.length; i++){
                    var v = null;
                    try { v = localStorage.getItem(KEYS[i]); } catch(e){}
                    if (v != null) { data[KEYS[i]] = v; count++; }
                  }
                  var msg = document.getElementById('msg');
                  var btn = document.getElementById('migrateBtn');
                  if (count === 0) {
                    msg.textContent = 'このブラウザには引き継ぐデータがないようです。新URLに直接移動します。';
                    btn.textContent = '新URLへ';
                  } else {
                    msg.textContent = 'このブラウザに保存されてた設定 ' + count + ' 件を新URLに引き継ぎます。';
                  }
                  btn.onclick = function(){
                    var url = 'https://akijikan-mitsukeru-kun.vercel.app/';
                    if (count > 0) {
                      try {
                        var b64 = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
                        url += '#migrate=' + b64;
                      } catch(e){ console.error(e); }
                    }
                    location.href = url;
                  };
                })();
              </script>
            </body>
          </html>
          EOF

      # ---------- houmon-app ----------
      # houmon-app は Vercel に統一済み（https://houmon-app-lilac.vercel.app/）。
      # このリダイレクト HTML は「旧 GH Pages 版をブックマークしてる人」救済用。
      # ポータルサイトのカードは直接 Vercel URL に飛ぶので、通常はここを踏まない。
      - name: houmon-app は Vercel にリダイレクト
        run: |
          mkdir -p _site/houmon-app
          cat > _site/houmon-app/index.html <<'EOF'
          <!doctype html>
          <html lang="ja">
            <head>
              <meta charset="utf-8">
              <title>家庭訪問アプリ — 移動しました</title>
              <meta http-equiv="refresh" content="0; url=https://houmon-app-lilac.vercel.app/">
              <link rel="canonical" href="https://houmon-app-lilac.vercel.app/">
              <style>
                body { font-family: system-ui, -apple-system, sans-serif; padding: 2rem; text-align: center; color: #333; }
                a { color: #0070f3; text-decoration: none; font-weight: bold; }
              </style>
            </head>
            <body>
              <p>家庭訪問アプリは <a href="https://houmon-app-lilac.vercel.app/">houmon-app-lilac.vercel.app</a> に移動しました。</p>
              <p>自動的に遷移しない場合は上のリンクをタップしてください。</p>
            </body>
          </html>
          EOF

      # ---------- design-gallery ----------
      # Vercel に統一済み（https://design-gallery-puce.vercel.app/）。
      # GH Pages 側ではビルドせず、旧URLにアクセスした人を Vercel に誘導する。
      # これで swc のフラッキーバグ（Linux ネイティブ SWC が入らず Turbopack が落ちる）問題から解放。
      - name: design-gallery は Vercel にリダイレクト
        run: |
          mkdir -p _site/design-gallery
          cat > _site/design-gallery/index.html <<'EOF'
          <!doctype html>
          <html lang="ja">
            <head>
              <meta charset="utf-8">
              <title>Design Gallery — 移動しました</title>
              <meta http-equiv="refresh" content="0; url=https://design-gallery-puce.vercel.app/">
              <link rel="canonical" href="https://design-gallery-puce.vercel.app/">
              <style>body{font-family:system-ui,-apple-system,sans-serif;padding:2rem;text-align:center;color:#333;}a{color:#0070f3;text-decoration:none;font-weight:bold;}</style>
            </head>
            <body>
              <p>Design Gallery は <a href="https://design-gallery-puce.vercel.app/">design-gallery-puce.vercel.app</a> に移動しました。</p>
            </body>
          </html>
          EOF

      # ---------- travel-shiori / nittei-chousei ----------
      # 本番は Vercel (travel-shiori.vercel.app / nittei-chousei.vercel.app)。
      # GitHub Pages 側ではビルドせず、ポータルから外部リンクで飛ばす運用に変更。
      # （product.meta.json の "path" に Vercel URL を設定済み）

      # ---------- デプロイ ----------
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
