name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # ---------- ポータル ----------
      - name: ポータルHTML自動生成
        run: bash portal/build.sh

      - name: ポータルのファビコンをコピー
        run: cp portal/favicon.png _site/favicon.png

      # ---------- Retro Games ----------
      - name: レトロゲームをコピー
        run: |
          mkdir -p "_site/retro-games"
          cp "Retro Games/index.html" "_site/retro-games/index.html"
          cp "Retro Games/plusman.html" "_site/retro-games/plusman.html"
          cp "Retro Games/samurai_fighter.html" "_site/retro-games/samurai_fighter.html"
          cp "Retro Games/space_invaders.html" "_site/retro-games/space_invaders.html"
          cp "Retro Games/manifest.json" "_site/retro-games/manifest.json"
          cp "Retro Games/icon-192.png" "_site/retro-games/icon-192.png"
          cp "Retro Games/icon-512.png" "_site/retro-games/icon-512.png"
          cp "Retro Games/apple-touch-icon.png" "_site/retro-games/apple-touch-icon.png"
          cp "Retro Games/favicon-32.png" "_site/retro-games/favicon-32.png"

      # ---------- 空き時間みつける君 ----------
      - name: 空き時間みつける君をコピー
        run: |
          mkdir -p "_site/akijikan-mitsukeru-kun"
          cp akijikan-mitsukeru-kun/index.html "_site/akijikan-mitsukeru-kun/index.html"
          cp akijikan-mitsukeru-kun/manifest.json "_site/akijikan-mitsukeru-kun/manifest.json"
          cp akijikan-mitsukeru-kun/icon-192.png "_site/akijikan-mitsukeru-kun/icon-192.png"
          cp akijikan-mitsukeru-kun/icon-512.png "_site/akijikan-mitsukeru-kun/icon-512.png"
          cp akijikan-mitsukeru-kun/apple-touch-icon.png "_site/akijikan-mitsukeru-kun/apple-touch-icon.png"
          cp akijikan-mitsukeru-kun/favicon-32.png "_site/akijikan-mitsukeru-kun/favicon-32.png"

      # ---------- houmon-app ----------
      - name: houmon-app の依存をインストール
        working-directory: houmon-app
        run: npm ci

      - name: houmon-app をビルド
        working-directory: houmon-app
        run: npm run build
        env:
          BASE_PATH: /houmon-app

      - name: houmon-app をコピー
        run: cp -r houmon-app/out _site/houmon-app

      # ---------- travel-shiori ----------
      - name: travel-shiori の依存をインストール
        working-directory: travel-shiori
        run: npm ci

      - name: travel-shiori をビルド
        working-directory: travel-shiori
        run: npm run build
        continue-on-error: true

      - name: travel-shiori をコピー
        run: |
          if [ -d travel-shiori/out ]; then
            cp -r travel-shiori/out _site/travel-shiori
          else
            mkdir -p _site/travel-shiori
            echo '<html><body><p>Coming soon</p></body></html>' > _site/travel-shiori/index.html
          fi

      # ---------- nittei-chousei ----------
      - name: nittei-chousei の依存をインストール
        working-directory: nittei-chousei
        run: npm ci

      - name: nittei-chousei をビルド
        working-directory: nittei-chousei
        run: npm run build
        continue-on-error: true
        env:
          BASE_PATH: /nittei-chousei
          NEXT_EXPORT: "1"

      - name: nittei-chousei をコピー
        run: |
          if [ -d nittei-chousei/out ]; then
            cp -r nittei-chousei/out _site/nittei-chousei
          else
            mkdir -p _site/nittei-chousei
            echo '<html><body><p>Coming soon</p></body></html>' > _site/nittei-chousei/index.html
          fi

      # ---------- デプロイ ----------
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
