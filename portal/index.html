<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ---------- Lock screen ---------- */
  #lock {
    position: fixed; inset: 0;
    background: #0a0a0a;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .lock-box {
    text-align: center;
    color: #ccc;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .lock-box h1 {
    font-size: 1.2rem;
    letter-spacing: 4px;
    margin-bottom: 24px;
    color: #fff;
  }
  .lock-box input {
    width: 220px;
    padding: 10px 40px 10px 14px;
    border: 1px solid #333;
    border-radius: 8px;
    background: #161616;
    color: #fff;
    font-size: 1rem;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .lock-box input:focus { border-color: #555; }
  .pw-toggle {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #666;
    cursor: pointer;
    padding: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
  }
  .pw-toggle:hover { color: #aaa; }
  .pw-toggle svg { width: 18px; height: 18px; display: block; }
  .pw-toggle .icon-off { display: none; }
  .pw-toggle.shown .icon-on { display: none; }
  .pw-toggle.shown .icon-off { display: block; }
  .lock-box input.shake {
    animation: shake 0.3s;
    border-color: #c0392b;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  /* ---------- Main ---------- */
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
  }
  #app {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 24px 24px;
  }
  #app.visible { display: flex; }

  .products-wrap { flex: 1; }

  header {
    margin-bottom: 48px;
  }
  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }
  header p {
    font-size: 0.85rem;
    color: #666;
  }

  .products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .product {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 20px;
    background: #141414;
    border: 1px solid #1e1e1e;
    border-radius: 12px;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
    position: relative;
  }
  .product:hover {
    background: #1a1a1a;
    border-color: #333;
    transform: translateY(-2px);
  }

  .product-icon {
    font-size: 1.8rem;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    flex-shrink: 0;
  }

  .product-info {
    min-width: 0;
  }
  .product-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .product-period {
    font-size: 0.8rem;
    color: #9a9a9a;
    font-weight: 500;
    letter-spacing: 0.3px;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }

  .product-arrow {
    display: none;
  }

  @media (max-width: 480px) {
    .products {
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .product { padding: 16px; }
    .product-icon { width: 44px; height: 44px; font-size: 1.5rem; }
    .product-name { font-size: 0.85rem; }
    .product-period { font-size: 0.75rem; }
  }

  footer {
    margin-top: auto;
    padding-top: 60px;
    text-align: center;
    color: #333;
    font-size: 0.75rem;
  }
</style>
</head>
<body>

<!-- Lock Screen -->
<div id="lock">
  <div class="lock-box">
    <h1>ENTER PASSWORD</h1>
    <div style="position:relative;display:inline-block;">
      <input type="password" id="pw" placeholder="password" autofocus>
      <button type="button" id="toggle-pw" class="pw-toggle" aria-label="パスワード表示切替">
        <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <svg class="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6.5 0-10-7-10-7a19.77 19.77 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c6.5 0 10 7 10 7a19.77 19.77 0 0 1-3.16 4.19"/>
          <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
          <line x1="3" y1="3" x2="21" y2="21"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Main Content -->
<div id="app">
  <div class="products-wrap">
    <header>
      <h1>Products</h1>
    </header>

    <div class="products">
{{PRODUCT_CARDS}}
    </div>
  </div>

  <footer>&copy; Hideyuki Yamanaka</footer>
</div>

<script>
(function() {
  // SHA-256 hash of the password — change this to set a new password
  // Default: "products" → hash below
  const HASH = 'b1fcd05d3630fa459f747c83b2c65a01bd166dacd7a1d0d2521aa16598c9e63c';

  const KEY = 'portal_auth';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256',
      new TextEncoder().encode(str));
    return [...new Uint8Array(buf)]
      .map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function unlock() {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').classList.add('visible');
  }

  // Check if already authenticated
  if (sessionStorage.getItem(KEY) === '1') {
    unlock();
  }

  document.getElementById('toggle-pw').addEventListener('click', function() {
    const pw = document.getElementById('pw');
    const isHidden = pw.type === 'password';
    pw.type = isHidden ? 'text' : 'password';
    this.classList.toggle('shown', isHidden);
    pw.focus();
  });

  document.getElementById('pw').addEventListener('keydown', async function(e) {
    if (e.key !== 'Enter') return;
    const hash = await sha256(this.value);
    if (hash === HASH) {
      sessionStorage.setItem(KEY, '1');
      unlock();
    } else {
      this.value = '';
      this.classList.add('shake');
      setTimeout(() => this.classList.remove('shake'), 350);
    }
  });
})();
</script>

</body>
</html>
